---
# ============================================================
# Project Configuration — High-Paying Jobs in the US
# ============================================================
# All thresholds, paths, and constants live here.
# Never hardcode these values in notebooks or scripts.

# ── Data Paths ─────────────────────────────────────────────
data:
  resources_dir: "Resources"
  data_dir: "Data"
  images_dir: "Images"
  models_dir: "models"
  raw_bls: "Resources/bls_state_data.xlsx"
  raw_census: "Resources/census_data.csv"
  cleaned: "Data/cleaned_high_pay_data.csv"
  bls_processed: "Data/bls_data.csv"
  census_processed: "Data/census_data.csv"

# ── Cleaning Thresholds ────────────────────────────────────
thresholds:
  # Minimum annual income (Census CPS variable: INCTOT) to be
  # classified as "high-pay". Equivalent to ~$48.08/hr at 40h/52w.
  min_annual_income: 100000
  # Corresponding BLS hourly mean floor (100000 / 2080 hours).
  min_hourly_mean: 48.08

# ── Model Configuration ────────────────────────────────────
model:
  test_size: 0.20
  random_state: 42
  # XGBoost hyper-parameters — multi-quantile XGBoost via
  # ``reg:quantileerror`` with ``quantile_alpha=[0.10, 0.50, 0.90]``.
  # Trained on log1p(Annual Income); callers must expm1() the prediction.
  n_estimators: 169
  max_depth: 3
  learning_rate: 0.045
  subsample: 0.741
  colsample_bytree: 0.829
  reg_lambda: 9.88      # L2 regularisation — critical for high-variance income data
  # Target transformation: model is trained on log1p(Annual Income).
  # Callers must expm1() the raw prediction to get dollar values.
  log_transform_target: true
  # Cross-validation
  cv_folds: 5
  # Saved artefacts — XGBoost native format (.ubj) and JSON (no pickle)
  model_path: "models/xgb_salary_model.ubj"
  features_path: "models/feature_names.json"
  metrics_path: "models/model_metrics.json"
  group_means_path: "models/group_means.json"
  # Premium-tier classifier head — trained alongside the quantile
  # regressor on the same feature set. Predicts P(Annual Income >=
  # premium_threshold) *within the existing high-pay cohort*. This is
  # "Gap 1 Phase 1" — the next-best-layered task the filtered dataset
  # supports. Phase 2 (unfiltered >= $100K membership classifier)
  # requires raw IPUMS Census microdata that is not in the repo.
  classifier_path: "models/xgb_premium_classifier.ubj"
  premium_threshold: 150000

# ── Visualization ──────────────────────────────────────────
visualization:
  dpi: 300
  figure_size: [12, 6]
  colors:
    money_seq: "Blues"
    count_seq: "Greys"
    gender_male: "#2196F3"
    gender_female: "#E91E63"
    accent: "#FF6F00"

# ── Education Ordinal Mapping ──────────────────────────────
# Used for both analysis and model feature encoding.
education_order:
  "Bachelor's degree": 1
  "Master's degree": 2
  "Professional degree": 3
  "Doctoral degree": 4

# ── Census Regional Classification ────────────────────────
