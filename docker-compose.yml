services:

  # ── Streamlit interactive dashboard ────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    image: high-pay-dashboard:latest
    container_name: high_pay_dashboard
    ports:
      - "8501:8501"
    volumes:
      # Persist trained model so it survives container restarts
      - ./models:/app/models
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── FastAPI salary prediction API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: high-pay-api:latest
    container_name: high_pay_api
    ports:
      - "8000:8000"
    volumes:
      # Share the same model artefact with the dashboard service
      - ./models:/app/models
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
