services:

  # ── Streamlit interactive dashboard ────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    image: high-pay-dashboard:latest
    container_name: high_pay_dashboard
    ports:
      - "8501:8501"
    volumes:
      # Persist trained model so it survives container restarts
      - ./models:/app/models
      # Dataset mounted read-only — not baked into the image
      - ./Data:/app/Data:ro
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── FastAPI salary prediction API ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: high-pay-api:latest
    container_name: high_pay_api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Enables the PredictionCache in api/cache.py. Unset this (or remove
      # the redis service) to run the API with a no-op cache.
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=3600
    volumes:
      # Share the same model artefact with the dashboard service
      - ./models:/app/models
      # Dataset mounted read-only — not baked into the image
      - ./Data:/app/Data:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Redis — prediction cache backend ───────────────────────────────────────
  # Deterministic-prediction cache used by /predict. The API degrades to a
  # no-op cache if this service is removed or REDIS_URL is unset.
  redis:
    image: redis:7-alpine
    container_name: high_pay_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 192M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
