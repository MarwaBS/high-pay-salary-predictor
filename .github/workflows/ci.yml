name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Fail on syntax errors or undefined names; warn on style
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-line-length=120 \
            --exclude=.git,__pycache__,.venv,*.ipynb --statistics

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  notebook-check:
    name: Notebook syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install nbformat
        run: pip install nbformat
      - name: Validate notebook JSON
        run: |
          python - <<'EOF'
          import nbformat, glob, sys
          errors = []
          for path in glob.glob("*.ipynb"):
              try:
                  nb = nbformat.read(path, as_version=4)
                  nbformat.validate(nb)
                  print(f"  OK  {path}")
              except Exception as e:
                  errors.append(f"FAIL {path}: {e}")
                  print(f"FAIL {path}: {e}")
          if errors:
              sys.exit(1)
          EOF
