name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security — audit dependencies for known CVEs
        run: |
          pip-audit --requirement requirements.txt --skip-editable || true

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github

      - name: Format check with ruff
        run: |
          ruff format --check .

      - name: Train model (required by API + TestModelPrediction)
        run: |
          python scripts/train_model.py

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  notebook-check:
    name: Notebook syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install nbformat
        run: pip install nbformat
      - name: Validate notebook JSON
        run: |
          python - <<'EOF'
          import nbformat, glob, sys
          errors = []
          for path in glob.glob("*.ipynb"):
              try:
                  nb = nbformat.read(path, as_version=4)
                  nbformat.validate(nb)
                  print(f"  OK  {path}")
              except Exception as e:
                  errors.append(f"FAIL {path}: {e}")
                  print(f"FAIL {path}: {e}")
          if errors:
              sys.exit(1)
          EOF
