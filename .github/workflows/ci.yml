name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let both Python versions run independently
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pip-audit

      - name: Security — audit dependencies for known CVEs
        run: |
          pip-audit --requirement requirements.txt --skip-editable \
            --ignore-vuln CVE-2025-69872

      - name: Generate CycloneDX SBOM (API runtime surface)
        # Standard 2026 supply-chain artifact. Scans requirements-api.txt
        # (what ships in the API Docker image) and emits a CycloneDX 1.5
        # JSON stored as a 90-day CI artifact for downstream SCA / SLSA
        # tooling. Mirror of the Price_Prediction / ResumeForge pattern.
        run: |
          pip-audit --requirement requirements-api.txt --skip-editable \
            --format=cyclonedx-json \
            --output=sbom-api.cyclonedx.json \
            --ignore-vuln CVE-2025-69872
      - name: Upload SBOM artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-api-cyclonedx-${{ github.run_number }}
          path: sbom-api.cyclonedx.json
          retention-days: 90

      - name: Lint with ruff
        run: |
          ruff check . --output-format=github

      - name: Bandit security scan (source + api)
        # Complementary to pip-audit: static-analyses the project's own
        # code for issues bandit flags (hardcoded secrets, insecure
        # yaml.load, weak crypto, etc.). Fails on MEDIUM+ severity.
        run: |
          pip install bandit
          bandit -r api/ pipeline.py scripts/ -n 3 -ll

      - name: Format check with ruff
        run: |
          ruff format --check .

      - name: Train quantile model (required by API + TestModelPrediction)
        run: |
          # Produces models/xgb_salary_model.ubj as a multi-quantile XGBoost
          # model. Tests expect the quantile output shape (n, 3) — see
          # tests/test_pipeline.py::test_model_outputs_quantile_triple.
          python -m scripts.train_quantile

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  notebook-check:
    name: Notebook syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install nbformat
        run: pip install nbformat
      - name: Validate notebook JSON
        run: |
          python - <<'EOF'
          import nbformat, glob, os, sys
          errors = []
          for path in glob.glob("*.ipynb"):
              try:
                  nb = nbformat.read(path, as_version=4)
                  nbformat.validate(nb)
                  print(f"  OK  {path}")
              except Exception as e:
                  errors.append(f"FAIL {path}: {e}")
                  print(f"FAIL {path}: {e}")
          if errors:
              sys.exit(1)
          EOF

  # ── CD: Build & Push Docker images on merge to main ────────────────────────
  deploy:
    name: Build & Push Docker Images
    needs: [test, notebook-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set lowercase image name
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image (load for Trivy scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: false
          load: true
          tags: ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan API image (HIGH/CRITICAL, ignore-unfixed)
        # Container-layer vulnerability scan complementary to pip-audit.
        # `.trivyignore` at repo root holds managed-risk CVE IDs. Fails
        # the job BEFORE the push step, so a vulnerable image never
        # reaches GHCR.
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivyignores: .trivyignore

      - name: Push API image (post-scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/api:latest
            ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          cache-from: type=gha

      - name: Build Dashboard image (load for Trivy scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dashboard
          push: false
          load: true
          tags: ${{ env.IMAGE_BASE }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan Dashboard image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/dashboard:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivyignores: .trivyignore

      - name: Push Dashboard image (post-scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dashboard
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/dashboard:latest
            ${{ env.IMAGE_BASE }}/dashboard:${{ github.sha }}
          cache-from: type=gha

      - name: Train quantile model for smoke test
        run: |
          pip install -r requirements.txt
          pip install -e .
          python -m scripts.train_quantile

      - name: Smoke test API image
        run: |
          docker run -d --name smoke-api -p 8000:8000 \
            -v ${{ github.workspace }}/models:/app/models:ro \
            -v ${{ github.workspace }}/Data:/app/Data:ro \
            ${{ env.IMAGE_BASE }}/api:${{ github.sha }}
          # Poll /health with a retry loop instead of a fixed sleep —
          # cold-start loading of the CSV + XGBoost model on a GHA runner
          # is variable and can exceed any fixed wait. 30 × 1s = 30s cap.
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Smoke test passed — API healthy after ${i}s"
              docker stop smoke-api
              exit 0
            fi
            sleep 1
          done
          echo "Smoke test failed — API never became healthy within 30s"
          docker logs smoke-api
          docker stop smoke-api
          exit 1
