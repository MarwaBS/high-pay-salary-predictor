## DVC Pipeline — High-Paying Jobs US
## Reproduces the full ML pipeline from cleaned data to deployed model.
##
## Usage:
##   dvc repro          # re-run only stages whose deps changed
##   dvc dag             # visualize the pipeline DAG
##   dvc metrics show    # show current model metrics
##   dvc diff            # show what changed since last commit

stages:
  train:
    cmd: python scripts/train_model.py
    deps:
      - Data/cleaned_high_pay_data.csv
      - scripts/train_model.py
      - pipeline.py
      - config.yaml
    outs:
      - models/xgb_salary_model.ubj
      - models/feature_names.json
      - models/group_means.json
    metrics:
      - models/model_metrics.json:
          cache: false
    plots:
      - models/model_metrics.json:
          x: train_date
          y: r2
